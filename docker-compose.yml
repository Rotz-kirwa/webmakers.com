services:
  postgres:
    image: postgres:16-alpine
    container_name: webmakers-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: webmakers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - webmakers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webmakers"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  webmakers_postgres_data:
